name: Deploy Live to Firebase Hosting

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: read

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: true

jobs:
  deploy_live:
    runs-on: ubuntu-latest
    env:
      APP_ID: ${{ vars.APP_ID }}
      ADMIN_PASSWORD: ${{ vars.ADMIN_PASSWORD }}
      FIREBASE_API_KEY: ${{ vars.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
      FIREBASE_MEASUREMENT_ID: ${{ vars.FIREBASE_MEASUREMENT_ID }}
      FIREBASE_PROJECT_ALIAS: ${{ vars.FIREBASE_PROJECT_ALIAS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate runtime config
        run: python3 scripts/generate_local_config.py --from-process-env

      - name: Deploy live
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
          channelId: live
